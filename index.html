<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCentral Diagnóstico IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f5f4f0;
        min-height: 100vh;
      }
      #root {
        min-height: 100vh;
      }
      /* CSS variables para o app funcionar sem o claude.ai */
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f4f0;
        --color-background-tertiary: #eeede9;
        --color-background-danger: #fef2f2;
        --color-background-success: #f0fdf4;
        --color-background-warning: #fefce8;
        --color-background-info: #eff6ff;
        --color-text-primary: #111020;
        --color-text-secondary: #666666;
        --color-text-tertiary: #999999;
        --color-text-danger: #991b1b;
        --color-text-success: #166534;
        --color-text-warning: #854d0e;
        --color-text-info: #1d4ed8;
        --color-border-primary: rgba(0,0,0,0.4);
        --color-border-secondary: rgba(0,0,0,0.3);
        --color-border-tertiary: rgba(0,0,0,0.15);
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --border-radius-xl: 16px;
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', monospace;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
